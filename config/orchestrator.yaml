server:
  port: 7080

escalation:
  evaluatorModel: "claude-haiku-4-5-20251001"
  confidenceThreshold: 0.8
  # Telegram approval timeout in seconds. Set to 0 to disable (wait indefinitely).
  telegramTimeoutSeconds: 0

telegram:
  # Set via env: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
  enabled: true
  notifyOnStart: false
  notifyOnComplete: false
  notifyOnError: true
  denialAlertThreshold: 5

stop:
  # When agent stops with an error, auto-retry with guidance
  retryOnError: true
  maxRetries: 2
  # When uncertain, ask via Telegram
  escalateToTelegram: true

spawn:
  searchPaths:
    - ~/dev
    - ~/dev+rc10r

mode:
  # Startup mode: "remote" (full Telegram oversight) or "local" (passthrough)
  default: "remote"
  # macOS-only: auto-switch based on idle time
  autoDetect: false
  idleThresholdSeconds: 300
  pollIntervalSeconds: 60
